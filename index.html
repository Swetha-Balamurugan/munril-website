<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Landing Page</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.hero-img {
    height: 100vh;
    object-fit: cover;
}

.custom-caption {
    top: 50%;
    transform: translateY(-50%);
    bottom: unset;
}

.carousel-item::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

.carousel-caption {
    z-index: 2;
}

.nav-hover {
    position: relative;
    transition: color 0.3s ease;
}

.nav-hover:hover {
    color: #0d6efd;
}

.nav-hover::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #0d6efd;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-hover:hover::after {
    width: 100%;
}

.btn {
    transition: all 0.3s ease;
}

.btn:hover {
    transform: scale(1.05);
}

@media (max-width: 768px) {
    .carousel-caption h1 {
        font-size: 22px;
    }

    .carousel-caption p {
        font-size: 14px;
    }
}
</style>
   
    
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Mundril</a>

        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-2">
                <li class="nav-item"><a class="nav-link nav-hover" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link nav-hover" href="#">Services</a></li>
                <li class="nav-item"><a class="nav-link nav-hover" href="#">Clients</a></li>
                <li class="nav-item"><a class="nav-link nav-hover" href="#">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>


<div id="heroCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">

    <div class="carousel-inner">

       
        <div class="carousel-item active">
            <img src="./Assets/img1.jpg" class="d-block w-100 hero-img">

            <div class="carousel-caption custom-caption text-end">
                <h1>Empowering Teams for Success</h1>
                <p>We build solutions that enhance productivity and customer satisfaction.</p>
                <button class="btn btn-warning mt-3">Explore</button>
            </div>
        </div>

      
        <div class="carousel-item">
            <img src="./Assets/img2.jpg" class="d-block w-100 hero-img">

            <div class="carousel-caption custom-caption text-end">
                <h1>Smart Business Solutions</h1>
                <p>Easy access. Seamless experience. Better results.</p>
                <button class="btn btn-warning mt-3">Explore</button>
            </div>
        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
